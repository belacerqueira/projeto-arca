    <title>Cadastre para feira de adoção</title>

<body> 
    
   

<div class="card"> 
     <h1>Cadastro para a feira de adoção!</h1> 

    <br><h2>Cadastro</h2>

        <h3>CNPJ: <input type="text" id="CNPJ" name="CNPJ" required> </h3>

        <h3>Estatuto Social: <input type="file" id="estatuto" name="estatuto" required></h3>
        <h3>Ata de Eleição: <input type="file" id="ata" name="ata" required></h3>
        <h3>Doc. dos representantes: <input type="file" id="representantes" name="representantes" required></h3>
        
         <h3>ART: <input type="text" id="ART" name="ART" required> </h3>
        <br><button>Confirmar</button>
</div>

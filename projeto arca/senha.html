<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha - Projeto Arca</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="logoprojetoarca.jpeg" alt="Projeto Arca" class="logo-img">
        </div>
        <div class="header-right">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-bar" />
            </div>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Senha</h1>
        <form class="form form-senha" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="nova-senha">Nova senha:</label>
                <input type="password" id="nova-senha" class="input-field" />
            </div>
            <div class="form-group">
                <label for="confirmar-nova-senha">Confirmar nova senha:</label>
                <input type="password" id="confirmar-nova-senha" class="input-field" />
            </div>
            <div class="form-options">
                <div class="remember-me remember-senha">
                    <input type="checkbox" id="lembrar-senha" />
                    <label for="lembrar-senha">Lembre-se desta senha</label>
                </div>
                <div class="form-submit submit-senha">
                    <button type="submit" class="btn-confirm">Enviar</button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>

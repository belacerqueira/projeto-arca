<main class="main-content">

    <h1 class="page-title">Cadastre sua ONG!</h1>

    <form class="form">

        <div class="form-group">
            <label>CNPJ:</label>
            <input type="text" class="input-field" required>
        </div>

        <div class="form-group">
            <label>Estatuto Social:</label>
            <input type="file" class="input-field" required>
        </div>

        <div class="form-group">
            <label>Ata de Eleição:</label>
            <input type="file" class="input-field" required>
        </div>

        <div class="form-group">
            <label>Doc. dos representantes:</label>
            <input type="file" class="input-field" required>
        </div>

        <div class="form-submit">
            <button type="submit" class="btn-confirm">
                Confirmar
            </button>
        </div>

    </form>

</main>

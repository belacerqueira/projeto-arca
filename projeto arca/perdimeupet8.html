<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdi meu pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="perdimeupet.css">
</head>
<body>
    <h2>Para ajudar na divulgação do seu pet perdido, preencha o quadro abaixo:</h2>
    <form id="formulario">
    <div class="form-floating">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
  <label for="floatingTextarea">Nome do pet:</label>
</div>
<div class="form-floating">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
  <label for="floatingTextarea">Idade do pet:</label>
</div>
<div class="form-floating">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
  <label for="floatingTextarea">Raça:</label>
</div>
<div class="form-floating">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
  <label for="floatingTextarea">Último local visto:</label>
</div>
<div class="form-floating">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
  <label for="floatingTextarea">Porte:</label>
</div>
<div class="mb-3">
  <label for="formFile" class="form-label">Adicione foto do seu pet aqui:</label>
  <input class="form-control" type="file" id="formFile">
</div>
</div>
  <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  
<div id="modalConfirmacao" class="modal">

    <div class="modal-conteudo">

        <h2>Deseja confirmar o envio?</h2>

        <div class="botoes">

            <button id="btnSim">Sim</button>

            <button id="btnNao">Não</button>

        </div>

    </div>

</div>

<script src="perdimeupet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>

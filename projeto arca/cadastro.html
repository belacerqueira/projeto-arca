<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Projeto Arca</title>
    <link rel="stylesheet" href="login.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    
</head>
<body>
    <header class="header">
       <div class="logo">
            <img src="logoprojetoarca.jpeg" alt="Projeto Arca" class="logo-img">
        </div>
        <div class="header-right">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-bar" />
            </div>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Cadastro</h1>
        <form class="form form-cadastro" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" class="input-field" />
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" class="input-field" />
            </div>
            <div class="form-group">
                <label for="nascimento">Data de nascimento:</label>
                <div class="date-wrapper">
                    <input type="text" id="nascimento" class="input-date" placeholder="  /  /" />
                    <span class="calendar-icon">📅</span>
                </div>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" class="input-field" />
            </div>
            <div class="form-group">
                <label for="confirmar-senha">Confirmar senha:</label>
                <input type="password" id="confirmar-senha" class="input-field" />
            </div>
            <div class="form-submit">
                <button type="submit" class="btn-confirm">Confirmar</button>
            </div>
        </form>
    </main>
</body>
</html>

    <main class="main-content" style="padding-top: 100px;"></main>

    <main class="main-content">
        <h1 class="page-title">Cadastro</h1>
        <form class="form form-cadastro" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" class="input-field" />
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" class="input-field" />
            </div>
            <div class="form-group">
                <label for="nascimento">Data de nascimento:</label>
                <div class="date-wrapper">
                    <input type="text" id="nascimento" class="input-date" placeholder="  /  /" />
                    <span class="calendar-icon">📅</span>
                </div>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" class="input-field" />
            </div>
            <div class="form-group">
                <label for="confirmar-senha">Confirmar senha:</label>
                <input type="password" id="confirmar-senha" class="input-field" />
            </div>
            <div class="form-submit">
                <button type="submit" class="btn-confirm">Confirmar</button>
            </div>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
